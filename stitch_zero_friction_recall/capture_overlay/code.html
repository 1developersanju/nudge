<main class="flex-grow p-8 opacity-20 pointer-events-none scale-95 transition-transform duration-700">

</div>

</div>

<span class="material-symbols-outlined group-active:scale-90 transition-transform">close</span>
</button>
</header>

<div class="w-full max-w-3xl flex flex-col items-center text-center space-y-12">
<div class="w-full">
<textarea autofocus="" class="w-full bg-transparent border-none focus:ring-0 text-3xl md:text-5xl font-bold text-on-surface placeholder:text-outline-variant text-center resize-none leading-tight" placeholder="Enter a thought, concept, or note..." rows="2"></textarea>
<!-- Chip Preview Area (Simulated Parsing) -->
<div class="mt-8 flex flex-wrap justify-center gap-3">
<div class="flex items-center gap-2 bg-primary/10 border border-primary/20 px-4 py-2 rounded-full transition-all">
<span class="text-primary text-sm font-semibold tracking-wide">Obsidian Framework</span>
<button class="flex items-center"><span class="material-symbols-outlined text-xs text-primary/60">close</span></button>
</div>
<div class="flex items-center gap-2 bg-primary/10 border border-primary/20 px-4 py-2 rounded-full transition-all">
<span class="text-primary text-sm font-semibold tracking-wide">Mental Models</span>
<button class="flex items-center"><span class="material-symbols-outlined text-xs text-primary/60">close</span></button>
</div>
<div class="flex items-center gap-2 bg-surface-container-highest/40 border border-outline-variant/20 px-4 py-2 rounded-full opacity-60">
<span class="text-on-surface-variant text-sm font-medium">Next unit...</span>
<span class="material-symbols-outlined text-xs">add</span>
</div>
</div>
<p class="mt-8 text-on-surface-variant/50 text-sm font-medium tracking-wide">
                    Press <span class="text-primary-container font-bold">Enter</span> or tap <span class="text-primary-container font-bold">+</span> to separate learning units
                </p>
</div>
</div>

<div class="flex flex-col gap-4">
<button class="capture-gradient w-full py-5 rounded-xl text-on-primary-fixed font-bold text-lg shadow-[0_24px_48px_rgba(210,206,255,0.15)] hover:shadow-[0_32px_64px_rgba(210,206,255,0.25)] transition-all flex items-center justify-center gap-3 group active:scale-[0.98]">
<span class="material-symbols-outlined group-hover:rotate-12 transition-transform">archive</span>

<div class="flex items-center gap-4 justify-center">
<button class="text-on-surface-variant hover:text-primary transition-colors flex items-center gap-2 py-2 px-4 rounded-full hover:bg-white/5">

<div class="h-1 w-1 rounded-full bg-outline-variant"></div>
